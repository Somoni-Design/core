networks:
  monitoring:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '14022004'
      POSTGRES_DB: core
    ports:
      - '5432:5432'
    networks:
      - monitoring
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  db-adminer:
    image: dockette/adminer:full
    container_name: adminer_db
    restart: always
    ports:
      - '5051:80'
    networks:
      - monitoring

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: '14022004'
      MINIO_UPDATE: 'off'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - ./minio-data:/data
    networks:
      - monitoring

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: dev
    container_name: backend
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - '8080:8080'
    depends_on:
      - db
      - minio
    networks:
      - monitoring
    volumes:
      - ../:/app
      - /app/node_modules
    command: npm run start:dev
