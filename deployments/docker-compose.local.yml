services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 14022004
      POSTGRES_DB: core
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app_network

  db-adminer:
    image: dockette/adminer:full
    container_name: db_adminer
    restart: always
    ports:
      - '5051:80'
    depends_on:
      - db
    networks:
      - app_network

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: production
    container_name: backend
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - '8080:8080'
    depends_on:
      - db
    networks:
      - app_network
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"

networks:
  app_network:
    driver: bridge

volumes:
  postgres-data:
